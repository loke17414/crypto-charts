<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="robots" content="noindex,nofollow" />
  <meta http-equiv="refresh" content="0;url=/admin-site/" />
  <title>Redirecting — Orbinex Console</title>
  <script>
    // Prefer dedicated subdomain when configured; otherwise path-based console.
    (function () {
      var host = location.hostname || '';
      var target = '/admin-site/';
      if (host === 'orbinex.net' || host === 'www.orbinex.net') {
        target = 'https://admin.orbinex.net/';
      }
      location.replace(target);
    })();
  </script>
</head>
<body>
  <p>관리자 콘솔이 별도 사이트로 이동했습니다.
    <a href="/admin-site/">여기</a>로 이동합니다.</p>
</body>
</html>
