<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>로그인 — Orbinex</title>
  <meta name="robots" content="noindex">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css">
  <link rel="stylesheet" href="css/account-pages.css?v=20260721a">
</head>
<body class="account-page">
  <header class="account-page__header">
    <a class="account-page__brand" href="index.html">
      <svg viewBox="0 0 32 32" fill="none" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
        <circle cx="16" cy="16" r="14" stroke="currentColor" stroke-width="2"/>
        <path d="M12 16L15 19L20 13" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
      </svg>
      Orbinex
    </a>
    <nav class="account-page__nav">
      <a href="trading.html">트레이딩</a>
      <a href="billing.html">요금제</a>
    </nav>
  </header>

  <main class="account-page__main">
    <div class="account-card">
      <h1>로그인</h1>
      <p class="account-card__lead">계정으로 로그인하거나 새로 가입하세요.</p>
      <div id="authStatus" class="account-card__status">확인 중…</div>

      <div id="authLoggedOut">
        <div class="form-group">
          <label for="authEmail">이메일</label>
          <input type="email" id="authEmail" autocomplete="username">
        </div>
        <div class="form-group">
          <label for="authPassword">비밀번호</label>
          <input type="password" id="authPassword" autocomplete="current-password">
        </div>
        <label class="account-card__consent">
          <input type="checkbox" id="authAcceptTerms">
          <span>
            <a href="terms.html" target="_blank" rel="noopener">이용약관</a>,
            <a href="privacy.html" target="_blank" rel="noopener">개인정보</a>,
            <a href="risk-disclosure.html" target="_blank" rel="noopener">위험고지</a>에 동의합니다 (회원가입 시 필수)
          </span>
        </label>
        <div class="account-card__actions">
          <button type="button" id="authLoginBtn" class="btn btn--primary">로그인</button>
          <button type="button" id="authRegisterBtn" class="btn btn--ghost">회원가입</button>
          <button type="button" id="authForgotBtn" class="btn btn--ghost">비밀번호 찾기</button>
          <button type="button" id="authResendVerifyBtn" class="btn btn--ghost">인증 메일 재전송</button>
        </div>
      </div>

      <div id="authLoggedIn" class="hidden">
        <p class="account-card__lead">이미 로그인되어 있습니다: <strong id="authUserEmail">—</strong></p>
        <div class="account-card__actions">
          <a class="btn btn--primary" href="trading.html" style="text-align:center;text-decoration:none;display:block;">트레이딩으로 이동</a>
          <button type="button" id="authLogoutBtn" class="btn btn--ghost">로그아웃</button>
        </div>
      </div>

      <p class="account-card__links">
        <a href="billing.html">요금제</a> ·
        <a href="trading.html">트레이딩</a>
      </p>
    </div>
  </main>

  <footer class="account-page__footer">
    <a href="terms.html">이용약관</a>
    <a href="privacy.html">개인정보</a>
    <a href="risk-disclosure.html">위험고지</a>
  </footer>

  <script src="js/futures-api-client.js?v=20260721e"></script>
  <script src="js/auth.js?v=20260721f"></script>
  <script>
    document.addEventListener('DOMContentLoaded', () => {
      AppAuth.bootLoginPage();
    });
  </script>
</body>
</html>
