<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>계정 — Orbinex</title>
  <meta name="robots" content="noindex">
  <link rel="stylesheet" href="css/style.css">
  <link rel="stylesheet" href="css/account-pages.css?v=20260722e">
</head>
<body class="account-page">
  <header class="account-page__header">
    <a class="account-page__brand" href="index.html">Orbinex</a>
    <nav class="account-page__nav">
      <a href="trading.html">트레이딩</a>
      <a href="billing.html">요금제</a>
      <a href="login.html?next=account.html">로그인</a>
    </nav>
  </header>

  <main class="account-page__main">
    <div class="account-card account-card--wide">
      <h1>계정·개인정보</h1>
      <p class="account-card__lead">데이터 내보내기·계정 삭제. 비밀키 원문은 내보내지 않습니다.</p>
      <div id="authStatus" class="account-card__status">확인 중…</div>

      <div id="authLoggedOut" class="hidden">
        <p class="account-card__lead">로그인이 필요합니다.</p>
        <a class="btn btn--primary" href="login.html?next=account.html" style="text-align:center;text-decoration:none;display:block;">로그인</a>
      </div>

      <div id="authLoggedIn" class="hidden">
        <p style="margin-bottom:1rem;font-size:0.9rem;">
          <span class="text-muted">계정</span> <strong id="authUserEmail">—</strong>
        </p>

        <h2 style="font-size:1.05rem;margin:1.25rem 0 0.5rem;">데이터 내보내기</h2>
        <p class="account-card__lead">계정·구독·결제 원장·사용량을 JSON으로 다운로드합니다.</p>
        <button type="button" id="exportBtn" class="btn btn--primary">JSON 내보내기</button>

        <h2 style="font-size:1.05rem;margin:1.75rem 0 0.5rem;">계정 삭제</h2>
        <p class="account-card__lead">봇 중지·키 삭제·계정 cascade 삭제. 복구할 수 없습니다.</p>
        <div class="form-group">
          <label for="deletePassword">비밀번호 확인</label>
          <input type="password" id="deletePassword" autocomplete="current-password">
        </div>
        <div class="form-group">
          <label for="deleteConfirm">확인 문구 (DELETE 입력)</label>
          <input type="text" id="deleteConfirm" placeholder="DELETE" autocomplete="off">
        </div>
        <button type="button" id="deleteBtn" class="btn btn--ghost" style="color:#f87171;border-color:rgba(248,113,113,.35);">계정 영구 삭제</button>
        <p id="accountMsg" class="account-card__status" style="margin-top:1rem;"></p>

        <div class="account-card__actions" style="margin-top:1.5rem;">
          <a class="btn btn--ghost" href="billing.html" style="text-align:center;text-decoration:none;">요금제</a>
          <button type="button" id="authLogoutBtn" class="btn btn--ghost">로그아웃</button>
        </div>
      </div>
    </div>
  </main>

  <footer class="account-page__footer">
    <a href="terms.html">이용약관</a>
    <a href="privacy.html">개인정보</a>
    <a href="refund.html">환불정책</a>
  </footer>

  <script src="js/futures-api-client.js?v=20260722e"></script>
  <script src="js/auth.js?v=20260722e"></script>
  <script>
    document.addEventListener('DOMContentLoaded', async () => {
      if (typeof AppAuth !== 'undefined') {
        await AppAuth.init?.();
        const loggedIn = AppAuth.isLoggedIn();
        document.getElementById('authLoggedOut')?.classList.toggle('hidden', loggedIn);
        document.getElementById('authLoggedIn')?.classList.toggle('hidden', !loggedIn);
        const email = AppAuth.getUser()?.email;
        if (email) document.getElementById('authUserEmail').textContent = email;
        const statusEl = document.getElementById('authStatus');
        if (statusEl) statusEl.textContent = loggedIn ? '로그인됨' : '로그인 필요';
        document.getElementById('authLogoutBtn')?.addEventListener('click', () => AppAuth.logout());
      }

      const msg = document.getElementById('accountMsg');
      document.getElementById('exportBtn')?.addEventListener('click', async () => {
        msg.textContent = '내보내는 중…';
        try {
          const data = await FuturesApiClient.authExport();
          const blob = new Blob([JSON.stringify(data, null, 2)], { type: 'application/json' });
          const a = document.createElement('a');
          a.href = URL.createObjectURL(blob);
          a.download = `orbinex-export-${Date.now()}.json`;
          a.click();
          URL.revokeObjectURL(a.href);
          msg.textContent = '다운로드했습니다.';
        } catch (err) {
          msg.textContent = err.message || '내보내기 실패';
        }
      });

      document.getElementById('deleteBtn')?.addEventListener('click', async () => {
        if (!confirm('정말 계정을 삭제할까요? 되돌릴 수 없습니다.')) return;
        msg.textContent = '삭제 중…';
        try {
          await FuturesApiClient.authDeleteAccount({
            password: document.getElementById('deletePassword').value,
            confirm: document.getElementById('deleteConfirm').value,
          });
          msg.textContent = '삭제되었습니다. 로그아웃합니다.';
          AppAuth?.logout?.();
          location.href = 'index.html';
        } catch (err) {
          msg.textContent = err.message || '삭제 실패';
        }
      });
    });
  </script>
</body>
</html>
