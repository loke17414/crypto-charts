name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  bot-js:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: bot-js
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - run: npm run check

  python:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install deps
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
      - name: Import smoke
        run: |
          python -c "from bot.server import app; from bot.billing_service import apply_toss_webhook_event, cancel_toss_payment; from bot.platform_config import live_trading_enabled; print('ok', app.title, live_trading_enabled())"
