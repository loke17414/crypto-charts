<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>비밀번호 재설정 — Orbinex</title>
  <meta name="robots" content="noindex">
  <link rel="stylesheet" href="css/style.css">
  <style>
    .auth-page { max-width: 420px; margin: 3rem auto; padding: 0 1.25rem; }
    .auth-page h1 { font-size: 1.35rem; }
    .auth-page label { display: block; font-size: 0.8rem; margin: 0.75rem 0 0.25rem; }
    .auth-page input { width: 100%; padding: 0.55rem 0.65rem; }
    .auth-page button { margin-top: 1rem; width: 100%; padding: 0.65rem; }
    .auth-page .msg { margin-top: 1rem; font-size: 0.88rem; }
  </style>
</head>
<body>
  <main class="auth-page">
    <h1>비밀번호 재설정</h1>
    <p>새 비밀번호를 입력하세요 (8자 이상).</p>
    <label for="newPassword">새 비밀번호</label>
    <input type="password" id="newPassword" autocomplete="new-password" minlength="8">
    <label for="newPassword2">새 비밀번호 확인</label>
    <input type="password" id="newPassword2" autocomplete="new-password" minlength="8">
    <button type="button" id="resetBtn">변경하기</button>
    <p id="resetMsg" class="msg"></p>
    <p><a href="trading.html">트레이딩으로 이동</a></p>
  </main>
  <script src="js/futures-api-client.js?v=20260721d"></script>
  <script src="js/auth.js?v=20260721d"></script>
  <script>
    document.getElementById('resetBtn')?.addEventListener('click', async () => {
      const token = new URLSearchParams(location.search).get('token') || '';
      const p1 = document.getElementById('newPassword')?.value || '';
      const p2 = document.getElementById('newPassword2')?.value || '';
      const msg = document.getElementById('resetMsg');
      if (!token) { msg.textContent = '재설정 토큰이 없습니다.'; return; }
      if (p1.length < 8) { msg.textContent = '비밀번호는 8자 이상이어야 합니다.'; return; }
      if (p1 !== p2) { msg.textContent = '비밀번호가 일치하지 않습니다.'; return; }
      try {
        const data = await FuturesApiClient.authResetPassword(token, p1);
        if (data.access_token) {
          localStorage.setItem('crypto-charts-auth-token', data.access_token);
          if (data.user) localStorage.setItem('crypto-charts-auth-user', JSON.stringify(data.user));
        }
        msg.textContent = data.message || '비밀번호가 변경되었습니다.';
      } catch (err) {
        msg.textContent = err.message || '재설정 실패';
      }
    });
  </script>
</body>
</html>
